<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <title>Endo10 EVO - Endodontic Diagnosis Assistant</title>
  <link rel="stylesheet" href="/static/style.css">

  <style>
    .typing { display: inline-block; }
    .typing span {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin: 0 2px;
      background: #bbb;
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="messages"></div>
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Type your response..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
    <button id="download-btn"> Download PDF</button>
  </div>

  <script>
    const API_BASE = "https://endo10evo-production.up.railway.app";
    let indice = 0;
    const sessionId = Date.now().toString();
    sessionStorage.setItem("session_id", sessionId);

    function addMessage(message, sender) {
      if (!message) return;
      const messagesDiv = document.getElementById("messages");
      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message", sender);

      const avatar = document.createElement("img");
      avatar.src = sender === "bot" ? "/static/img/chatbot.png" : "/static/img/usuario.png";
      avatar.alt = sender === "bot" ? "Bot" : "User";
      avatar.classList.add("avatar");

      const text = document.createElement("div");
      text.classList.add("text");
      text.innerText = message;

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(text);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addTypingIndicator() {
      const messagesDiv = document.getElementById("messages");
      const typingDiv = document.createElement("div");
      typingDiv.classList.add("message", "bot");
      typingDiv.setAttribute("id", "typing");

      const avatar = document.createElement("img");
      avatar.src = "/static/img/chatbot.png";
      avatar.alt = "Bot";
      avatar.classList.add("avatar");

      const text = document.createElement("div");
      text.classList.add("text");
      text.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

      typingDiv.appendChild(avatar);
      typingDiv.appendChild(text);
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTypingIndicator() {
      const typingDiv = document.getElementById("typing");
      if (typingDiv) typingDiv.remove();
    }

    async function postForm(endpoint, params) {
      const body = new URLSearchParams(params);
      const response = await fetch(API_BASE + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString()
      });
      return await response.json();
    }

    function iniciarChat() {
      addMessage(
        "Hello! ¡Hola! Bonjour! 你好! Hallo! Ciao! Olá! नमस्ते! مرحبا! 안녕하세요! Привет! \n\nI am Endo10 EVO, your assistant for endodontic diagnosis. Please greet me in your preferred language. 🌍",
        "bot"
      );
    }

    async function handleBotResponse(data) {
      if (!data) return;

      if (data.mensagem) {
        addMessage(data.mensagem, "bot");
      } else if (data.pergunta) {
        addMessage(data.pergunta, "bot");
      }

      if (data.diagnosis) {
        const diagnosis = data.diagnosis;
        const d2009 = diagnosis.diagnosis_aae_2009_2013 || "";
        const d2025 = diagnosis.diagnosis_aae_ese_2025 || "";
        const comp = diagnosis.complementary_diagnosis || "";

        addTypingIndicator();
        const explicacaoData = await postForm("/explicacao/", {
          session_id: sessionId,
          diagnosis_aae_2009_2013: d2009,
          diagnosis_aae_ese_2025: d2025,
          complementary_diagnosis: comp
        });
        removeTypingIndicator();

        if (explicacaoData.explicacao) {
          addMessage(explicacaoData.explicacao, "bot");
        }
      }
    }

    document.getElementById("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const userInput = document.getElementById("user-input");
      const userMessage = userInput.value.trim();
      if (!userMessage) return;

      addMessage(userMessage, "user");
      userInput.value = "";

      addTypingIndicator();
      try {
        const data = await postForm("/responder/", {
          indice: indice,
          resposta_usuario: userMessage,
          session_id: sessionId
        });
        removeTypingIndicator();

        indice += 1;
        await handleBotResponse(data);
      } catch (error) {
        removeTypingIndicator();
        addMessage("There was an error processing your answer. Please try again.", "bot");
        console.error(error);
      }
    });

    document.getElementById("download-btn").addEventListener("click", () => {
      window.open(API_BASE + `/pdf/${sessionId}`, "_blank");
    });

    iniciarChat();
  </script>
</body>
</html>
